<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Squid Game</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- NAVBAR -->
    <header class="navbar">

      <div class="logo">
        <h2>SQUID <span>GAME</span></h2>
      </div>

      <nav class="nav-links">
        <a href="#">About</a>
        <a href="#" class="active">Watch Now</a>
        <a href="#">Actors</a>
        <a href="#">Contact</a>
      </nav>

      <div class="menu-icon">☰</div>

    </header>

    <!-- HERO SECTION -->
    <section class="hero">

      <!-- LEFT SIDE -->
      <div class="left-content">

        <img src="images/sq.background.png" class="title-image" alt="Squid Game Logo">

        <p>
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1 : 9 Episodes
        </p>

        <div class="buttons">

          <button class="play-btn">▶ Play Now</button>

          <button class="trailer-btn">▷ Watch Trailer</button>

        </div>

      </div>

      <!-- CENTER SCROLL -->
      <div class="scroll-text">
        <span>SCROLL</span>
        <div class="line"></div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right-content">

        <img src="images/mainn.png" alt="Main Character">

      </div>

      <!-- SOCIAL ICONS -->
      <div class="social-icons">
        <a href="#">𝕏</a>
        <a href="#">◎</a>
        <a href="#">f</a>
      </div>

    </section>

    <!-- CARDS -->
    <section class="cards-section">

      <div class="card">
        <img src="images/squid game.jpg" alt="">
        <div class="play-icon">▶</div>
      </div>

      <div class="card">
        <img src="images/mid.jpg" alt="">
        <div class="play-icon">▶</div>
      </div>

      <div class="card">
        <img src="images/right.jpg" alt="">
        <div class="play-icon">▶</div>
      </div>

    </section>

  </div>

</body>
</html>
